<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diary - ClearMind</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body{
            background:#f8f9fa;
        }
    </style>

</head>
<body>

<nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold text-primary"
           href="index.html">
            ClearMind
        </a>

        <div class="d-flex align-items-center ms-auto">

<span id="loggedInText"
      class="me-3 text-muted">
</span>

            <a href="diary.html"
               class="btn btn-outline-primary btn-sm me-2">
                Diary
            </a>

            <a href="appointments.html"
               class="btn btn-outline-primary btn-sm me-2">
                Appointments
            </a>

            <a href="resources.html"
               class="btn btn-outline-primary btn-sm me-2">
                Resources
            </a>

            <a href="activities.html"
               class="btn btn-outline-primary btn-sm me-2">
                Activities
            </a>

            <a href="index.html"
               class="btn btn-outline-secondary btn-sm me-2">
                Home
            </a>

            <a href="profile.html" class="btn btn-outline-primary btn-sm me-2">Profile</a>

            <button id="logoutBtn"
                    class="btn btn-danger btn-sm">
                Logout
            </button>

        </div>

    </div>
</nav>


<div class="container py-5">

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h1 class="fw-bold">
                Diary Management
            </h1>

            <p class="text-muted mb-0">
                Add, edit, delete and search your diary entries.
            </p>
        </div>
    </div>


    <div id="messageBox"></div>


    <div class="card shadow-sm mb-4"
         id="diaryFormCard">

        <div class="card-body">

            <h3 id="formTitle"
                class="mb-3">
                Add Diary Entry
            </h3>

            <form id="diaryForm">

                <input type="hidden"
                       id="diaryId">

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">
                            Title
                        </label>

                        <input type="text"
                               id="title"
                               class="form-control"
                               required>
                    </div>


                    <div class="col-md-6">
                        <label class="form-label">
                            Date
                        </label>

                        <input type="date"
                               id="date"
                               class="form-control"
                               required>
                    </div>


                    <div class="col-12">
                        <label class="form-label">
                            Content
                        </label>

                        <textarea id="content"
                                  class="form-control"
                                  rows="4"
                                  required></textarea>
                    </div>

                </div>


                <div class="mt-3">
                    <button type="submit"
                            id="saveBtn"
                            class="btn btn-primary">
                        Save Entry
                    </button>
                </div>

            </form>

        </div>
    </div>



    <div class="card shadow-sm">
        <div class="card-body">

            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3">

                <h3 class="mb-3 mb-md-0">
                    My Diary Entries
                </h3>

                <div class="d-flex gap-2">
                    <input type="text"
                           id="searchTitle"
                           class="form-control"
                           placeholder="Search by title">

                    <button class="btn btn-outline-primary"
                            id="searchBtn">
                        Search
                    </button>
                </div>

            </div>


            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">

                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Content</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                    </thead>

                    <tbody id="diaryTableBody"></tbody>

                </table>
            </div>

        </div>
    </div>

</div>



<script>
    const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
    const apiUrl = "/api/diary";

    if (!loggedInUser || !loggedInUser.id) {
        window.location.href = "login.html";
    }

    function showMessage(message, type) {
        $("#messageBox").html("<div class='alert alert-" + type + "'>" + message + "</div>");
    }

    function resetForm() {
        $("#diaryForm")[0].reset();
        $("#diaryId").val("");
        $("#formTitle").text("Add Diary Entry");
        $("#saveBtn").text("Save Entry");
    }

    function loadDiaries() {
        $.get(apiUrl + "/user/" + loggedInUser.id, function(diaries) {
            let html = "";

            $.each(diaries, function(i, diary) {
                html +=
                    "<tr>" +
                    "<td>" + diary.id + "</td>" +
                    "<td>" + diary.title + "</td>" +
                    "<td>" + diary.content + "</td>" +
                    "<td>" + diary.date + "</td>" +
                    "<td>" +
                    "<button class='btn btn-warning btn-sm me-2' onclick=\"editDiary('" + diary.id + "','" + diary.title + "','" + diary.content + "','" + diary.date + "')\">Edit</button>" +
                    "<button class='btn btn-danger btn-sm' onclick='deleteDiary(" + diary.id + ")'>Delete</button>" +
                    "</td>" +
                    "</tr>";
            });

            $("#diaryTableBody").html(html);
        });
    }

    function searchDiaries() {
        let title = $("#searchTitle").val();

        if (title == "") {
            loadDiaries();
            return;
        }

        $.get(apiUrl + "/user/" + loggedInUser.id + "/search?title=" + title, function(diaries) {
            let html = "";

            $.each(diaries, function(i, diary) {
                html +=
                    "<tr>" +
                    "<td>" + diary.id + "</td>" +
                    "<td>" + diary.title + "</td>" +
                    "<td>" + diary.content + "</td>" +
                    "<td>" + diary.date + "</td>" +
                    "<td>" +
                    "<button class='btn btn-warning btn-sm me-2' onclick=\"editDiary('" + diary.id + "','" + diary.title + "','" + diary.content + "','" + diary.date + "')\">Edit</button>" +
                    "<button class='btn btn-danger btn-sm' onclick='deleteDiary(" + diary.id + ")'>Delete</button>" +
                    "</td>" +
                    "</tr>";
            });

            $("#diaryTableBody").html(html);
        });
    }

    function editDiary(id, title, content, date) {

        $("#diaryId").val(id);
        $("#title").val(title);
        $("#content").val(content);
        $("#date").val(date);

        $("#formTitle").text("Edit Diary Entry");
        $("#saveBtn").text("Update Entry");
    }

    function deleteDiary(id) {
        if (!confirm("Delete this diary entry?")) {
            return;
        }

        $.ajax({
            url: apiUrl + "/" + id,
            type: "DELETE",
            success: function() {
                showMessage("Diary deleted", "success");
                loadDiaries();
            }
        });
    }

    $("#diaryForm").submit(function(e) {
        e.preventDefault();

        let id = $("#diaryId").val();

        let diaryData = {
            title: $("#title").val(),
            content: $("#content").val(),
            date: $("#date").val(),
            user: {
                id: loggedInUser.id
            }
        };

        if (id) {
            $.ajax({
                url: apiUrl + "/" + id,
                type: "PUT",
                contentType: "application/json",
                data: JSON.stringify(diaryData),
                success: function() {
                    showMessage("Diary updated", "success");
                    resetForm();
                    loadDiaries();
                }
            });
        } else {
            $.ajax({
                url: apiUrl,
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify(diaryData),
                success: function() {
                    showMessage("Diary added", "success");
                    resetForm();
                    loadDiaries();
                }
            });
        }
    });

    $("#searchBtn").click(function() {
        searchDiaries();
    });

    $("#logoutBtn").click(function() {
        localStorage.removeItem("loggedInUser");
        window.location.href = "index.html";
    });

    $("#loggedInText").text("Logged in as " + loggedInUser.username);

    loadDiaries();
</script>

</body>
</html>
