<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: Arial,serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f0f0f0; }
        input { margin: 5px 0; padding: 5px; width: 300px; }
        button { margin: 5px; padding: 5px 10px; cursor: pointer; }
        .box { border: 1px solid #ccc; padding: 15px; margin: 10px 0; }
        nav { margin: 20px 0; padding: 10px; background: #f0f0f0; }
        nav a { margin: 0 10px; text-decoration: none; color: #333; }
    </style>
</head>
<body>

<nav>
    <a href="/index.html">Home</a> |
    <a href="/articles.html">Articles</a> |
    <a href="/resources.html">Resources</a> |
    <a href="/users.html">Users</a> |
    <a href="/assessments.html">Assessments</a>
</nav>

<header>Users</header>

<input type="text" id="search" placeholder="Search by name..." onkeyup="doSearch()">

<div class="box">
    <input type="hidden" id="editId">
    <input type="text" id="userId" placeholder="User ID">
    <input type="text" id="userName" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">
    <button id="saveBtn">Add User</button>
</div>

<table id="list">
    <thead>
    <tr>
        <th>ID</th>
        <th>User ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<br>
<a href="/index.html">Return to Home</a>

<script>
    const API = "http://localhost:8080/api/users";

    function load() {
        $.get(API, function(data) {
            let html = "";
            for(let u of data) {
                html += '<tr>';
                html += '<td>' + u.id + '</td>';
                html += '<td>' + u.userId + '</td>';
                html += '<td>' + u.userName + '</td>';
                html += '<td>' + u.email + '</td>';
                html += '<td><button onclick="edit(' + u.id + ')">Edit</button> <button onclick="del(' + u.id + ')">Delete</button></td>';
                html += '</tr>';
            }
            $("#list tbody").html(html);
        });
    }

    $("#saveBtn").click(function() {
        let id = $("#editId").val();
        let item = {
            userId: $("#userId").val(),
            userName: $("#userName").val(),
            email: $("#email").val()
        };

        if(id) {
            $.ajax({
                url: `${API}/${id}`,
                method: "PUT",
                contentType: "application/json",
                data: JSON.stringify(item),
                success: function() {
                    $("#editId, #userId, #userName, #email").val("");
                    $("#saveBtn").text("Add User");
                    load();
                }
            });
        } else {
            $.ajax({
                url: API,
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify(item),
                success: function() {
                    $("#userId, #userName, #email").val("");
                    load();
                }
            });
        }
    });

    window.edit = function(id) {
        $.get(`${API}/${id}`, function(u) {
            $("#editId").val(u.id);
            $("#userId").val(u.userId);
            $("#userName").val(u.userName);
            $("#email").val(u.email);
            $("#saveBtn").text("Update User");
        });
    };

    window.del = function(id) {
        if(confirm("Delete?")) {
            $.ajax({
                url: `${API}/${id}`,
                method: "DELETE",
                success: function() {
                    load();
                }
            });
        }
    };

    window.doSearch = function() {
        let q = $("#search").val();
        if(q) {
            $.get(`${API}/search?name=${q}`, function(data) {
                let html = "";
                for(let u of data) {
                    html += '<tr>';
                    html += '<td>' + u.id + '</td>';
                    html += '<td>' + u.userId + '</td>';
                    html += '<td>' + u.userName + '</td>';
                    html += '<td>' + u.email + '</td>';
                    html += '<td><button onclick="edit(' + u.id + ')">Edit</button> <button onclick="del(' + u.id + ')">Delete</button></td>';
                    html += '</tr>';
                }
                $("#list tbody").html(html);
            });
        } else {
            load();
        }
    };

    load();
</script>
</body>
</html>
