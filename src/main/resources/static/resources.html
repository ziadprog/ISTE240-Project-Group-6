<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources - ClearMind</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background: #f8f9fa;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold text-primary"
           href="index.html">
            ClearMind
        </a>

        <div class="d-flex align-items-center ms-auto">

<span id="loggedInText"
      class="me-3 text-muted">
</span>

            <a href="diary.html"
               class="btn btn-outline-primary btn-sm me-2">
                Diary
            </a>

            <a href="appointments.html"
               class="btn btn-outline-primary btn-sm me-2">
                Appointments
            </a>

            <a href="resources.html"
               class="btn btn-outline-primary btn-sm me-2">
                Resources
            </a>

            <a href="activities.html"
               class="btn btn-outline-primary btn-sm me-2">
                Activities
            </a>

            <a href="index.html"
               class="btn btn-outline-secondary btn-sm me-2">
                Home
            </a>

            <a href="profile.html" class="btn btn-outline-primary btn-sm me-2">Profile</a>

            <button id="logoutBtn"
                    class="btn btn-danger btn-sm">
                Logout
            </button>

        </div>

    </div>
</nav>

<div class="container py-5">

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h1 class="fw-bold">Mental Health Resources</h1>
            <p class="text-muted mb-0">Find support, websites, and organizations that can help you.</p>
        </div>
    </div>

    <div id="messageBox"></div>

    <div class="card shadow-sm mb-4" id="resourceFormCard">
        <div class="card-body">
            <h3 id="formTitle" class="mb-3">Add Resource</h3>

            <form id="resourceForm">
                <input type="hidden" id="resourceId">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Name</label>
                        <input type="text" id="name" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Type</label>
                        <select id="type" class="form-control" required>
                            <option value="">Select Type</option>
                            <option value="Hotline">Hotline</option>
                            <option value="Non-Profit">Non-Profit</option>
                            <option value="Website">Website</option>
                            <option value="Support Group">Support Group</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea id="description" class="form-control" rows="3" required></textarea>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Website</label>
                        <input type="text" id="website" class="form-control" placeholder="www.example.com">
                    </div>
                </div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-primary" id="saveBtn">Save Resource</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3">
                <h3 class="mb-3 mb-md-0">Available Resources</h3>

                <div class="d-flex gap-2">
                    <select id="typeFilter" class="form-control" style="width: 130px;">
                        <option value="">All Types</option>
                        <option value="Hotline">Hotlines</option>
                        <option value="Non-Profit">Non-Profits</option>
                        <option value="Website">Websites</option>
                        <option value="Support Group">Support Groups</option>
                    </select>

                    <input type="text" id="searchInput" class="form-control" placeholder="Search by name">
                    <button class="btn btn-outline-primary" id="searchBtn">Search</button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Description</th>
                        <th>Website</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="resourcesTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
    const apiUrl = "/api/resources";

    if (!loggedInUser || !loggedInUser.id) {
        window.location.href = "login.html";
    }

    let allResources = [];

    function showMessage(message, type) {
        $("#messageBox").html("<div class='alert alert-" + type + "'>" + message + "</div>");
    }

    function resetForm() {
        $("#resourceForm")[0].reset();
        $("#resourceId").val("");
        $("#formTitle").text("Add Resource");
        $("#saveBtn").text("Save Resource");
    }

    function loadResources() {
        $.get(apiUrl + "/user/" + loggedInUser.id, function(resources) {
            allResources = resources;
            displayResources(resources);
        });
    }

    function displayResources(resources) {
        let html = "";

        $.each(resources, function(i, resource) {
            let website = "";

            if (resource.website) {
                let link = resource.website;

                if (!link.startsWith("http://") && !link.startsWith("https://")) {
                    link = "https://" + link;
                }

                website = "<a href='" + link + "' target='_blank'>" + resource.website + "</a>";
            }

            html +=
                "<tr>" +
                "<td>" + resource.id + "</td>" +
                "<td>" + resource.name + "</td>" +
                "<td>" + resource.type + "</td>" +
                "<td>" + resource.description + "</td>" +
                "<td>" + website + "</td>" +
                "<td>" +
                "<button class='btn btn-warning btn-sm me-2' onclick=\"editResource('" + resource.id + "','" + resource.name + "','" + resource.type + "','" + resource.description + "','" + resource.website + "')\">Edit</button>" +
                "<button class='btn btn-danger btn-sm' onclick='deleteResource(" + resource.id + ")'>Delete</button>" +
                "</td>" +
                "</tr>";
        });

        $("#resourcesTableBody").html(html);
    }

    function searchResources() {
        let name = $("#searchInput").val().toLowerCase();
        let type = $("#typeFilter").val();

        let filtered = allResources;

        if (name != "") {
            filtered = filtered.filter(function(resource) {
                return resource.name &&
                    resource.name.toLowerCase().includes(name);
            });
        }

        if (type != "") {
            filtered = filtered.filter(function(resource) {
                return resource.type == type;
            });
        }

        displayResources(filtered);
    }

    function editResource(id, name, type, description, website) {

        $("#resourceId").val(id);
        $("#name").val(name);
        $("#type").val(type);
        $("#description").val(description);
        $("#website").val(website);

        $("#formTitle").text("Edit Resource");
        $("#saveBtn").text("Update Resource");
    }

    function deleteResource(id) {
        if (!confirm("Delete this resource?")) {
            return;
        }

        $.ajax({
            url: apiUrl + "/" + id,
            type: "DELETE",
            success: function() {
                showMessage("Resource deleted", "success");
                loadResources();
            }
        });
    }

    $("#resourceForm").submit(function(e) {
        e.preventDefault();

        let id = $("#resourceId").val();

        let resourceData = {
            name: $("#name").val(),
            type: $("#type").val(),
            description: $("#description").val(),
            website: $("#website").val(),
            user: {
                id: loggedInUser.id
            }
        };

        if (id) {
            $.ajax({
                url: apiUrl + "/" + id,
                type: "PUT",
                contentType: "application/json",
                data: JSON.stringify(resourceData),
                success: function() {
                    showMessage("Resource updated", "success");
                    resetForm();
                    loadResources();
                }
            });
        } else {
            $.ajax({
                url: apiUrl,
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify(resourceData),
                success: function() {
                    showMessage("Resource added", "success");
                    resetForm();
                    loadResources();
                }
            });
        }
    });

    $("#searchBtn").click(function() {
        searchResources();
    });

    $("#typeFilter").change(function() {
        searchResources();
    });

    $("#logoutBtn").click(function() {
        localStorage.removeItem("loggedInUser");
        window.location.href = "index.html";
    });

    $("#loggedInText").text("Logged in as " + loggedInUser.username);

    loadResources();
</script>

</body>
</html>
