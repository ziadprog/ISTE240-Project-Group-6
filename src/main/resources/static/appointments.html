<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments - ClearMind</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background: #f8f9fa;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold text-primary"
           href="index.html">
            ClearMind
        </a>

        <div class="d-flex align-items-center ms-auto">

<span id="loggedInText"
      class="me-3 text-muted">
</span>

            <a href="diary.html"
               class="btn btn-outline-primary btn-sm me-2">
                Diary
            </a>

            <a href="appointments.html"
               class="btn btn-outline-primary btn-sm me-2">
                Appointments
            </a>

            <a href="resources.html"
               class="btn btn-outline-primary btn-sm me-2">
                Resources
            </a>

            <a href="activities.html"
               class="btn btn-outline-primary btn-sm me-2">
                Activities
            </a>

            <a href="index.html"
               class="btn btn-outline-secondary btn-sm me-2">
                Home
            </a>

            <a href="profile.html" class="btn btn-outline-primary btn-sm me-2">Profile</a>

            <button id="logoutBtn"
                    class="btn btn-danger btn-sm">
                Logout
            </button>

        </div>

    </div>
</nav>

<div class="container py-5">

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h1 class="fw-bold">Appointment Management</h1>
            <p class="text-muted mb-0">
                Add, edit, delete, and search your appointments.
            </p>
        </div>
    </div>

    <div id="messageBox"></div>

    <div class="card shadow-sm mb-4" id="appointmentFormCard">
        <div class="card-body">
            <h3 id="formTitle" class="mb-3">Add Appointment</h3>

            <form id="appointmentForm">
                <input type="hidden" id="appointmentId">

                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Title</label>
                        <input type="text" id="title" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Date</label>
                        <input type="date" id="date" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Time</label>
                        <input type="time" id="time" class="form-control" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea id="description" class="form-control" rows="3" required></textarea>
                    </div>
                </div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-primary" id="saveBtn">Save Appointment</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3">
                <h3 class="mb-3 mb-md-0">My Appointments</h3>

                <div class="d-flex gap-2">
                    <input type="text" id="searchTitle" class="form-control" placeholder="Search by title">
                    <button class="btn btn-outline-primary" id="searchBtn">Search</button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="appointmentTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script>
    const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
    const apiUrl = "/api/appointments";

    if (!loggedInUser || !loggedInUser.id) {
        window.location.href = "login.html";
    }

    function showMessage(message, type) {
        $("#messageBox").html("<div class='alert alert-" + type + "'>" + message + "</div>");
    }

    function resetForm() {
        $("#appointmentForm")[0].reset();
        $("#appointmentId").val("");
        $("#formTitle").text("Add Appointment");
        $("#saveBtn").text("Save Appointment");
    }

    function loadAppointments() {
        $.get(apiUrl + "/user/" + loggedInUser.id, function(appointments) {
            let html = "";

            $.each(appointments, function(i, appointment) {
                html +=
                    "<tr>" +
                    "<td>" + appointment.id + "</td>" +
                    "<td>" + appointment.title + "</td>" +
                    "<td>" + appointment.description + "</td>" +
                    "<td>" + appointment.date + "</td>" +
                    "<td>" + appointment.time + "</td>" +
                    "<td>" +
                    "<button class='btn btn-warning btn-sm me-2' onclick=\"editAppointment('" + appointment.id + "','" + appointment.title + "','" + appointment.description + "','" + appointment.date + "','" + appointment.time + "')\">Edit</button>" +
                    "<button class='btn btn-danger btn-sm' onclick='deleteAppointment(" + appointment.id + ")'>Delete</button>" +
                    "</td>" +
                    "</tr>";
            });

            $("#appointmentTableBody").html(html);
        });
    }

    function searchAppointments() {
        let title = $("#searchTitle").val();

        if (title == "") {
            loadAppointments();
            return;
        }

        $.get(apiUrl + "/user/" + loggedInUser.id + "/search?title=" + title, function(appointments) {
            let html = "";

            $.each(appointments, function(i, appointment) {
                html +=
                    "<tr>" +
                    "<td>" + appointment.id + "</td>" +
                    "<td>" + appointment.title + "</td>" +
                    "<td>" + appointment.description + "</td>" +
                    "<td>" + appointment.date + "</td>" +
                    "<td>" + appointment.time + "</td>" +
                    "<td>" +
                    "<button class='btn btn-warning btn-sm me-2' onclick=\"editAppointment('" + appointment.id + "','" + appointment.title + "','" + appointment.description + "','" + appointment.date + "','" + appointment.time + "')\">Edit</button>" +
                    "<button class='btn btn-danger btn-sm' onclick='deleteAppointment(" + appointment.id + ")'>Delete</button>" +
                    "</td>" +
                    "</tr>";
            });

            $("#appointmentTableBody").html(html);
        });
    }

    function editAppointment(id, title, description, date, time) {

        $("#appointmentId").val(id);
        $("#title").val(title);
        $("#description").val(description);
        $("#date").val(date);
        $("#time").val(time);

        $("#formTitle").text("Edit Appointment");
        $("#saveBtn").text("Update Appointment");
    }

    function deleteAppointment(id) {
        if (!confirm("Delete this appointment?")) {
            return;
        }

        $.ajax({
            url: apiUrl + "/" + id,
            type: "DELETE",
            success: function() {
                showMessage("Appointment deleted", "success");
                loadAppointments();
            }
        });
    }

    $("#appointmentForm").submit(function(e) {
        e.preventDefault();

        let id = $("#appointmentId").val();

        let appointmentData = {
            title: $("#title").val(),
            description: $("#description").val(),
            date: $("#date").val(),
            time: $("#time").val(),
            user: {
                id: loggedInUser.id
            }
        };

        if (id) {
            $.ajax({
                url: apiUrl + "/" + id,
                type: "PUT",
                contentType: "application/json",
                data: JSON.stringify(appointmentData),
                success: function() {
                    showMessage("Appointment updated", "success");
                    resetForm();
                    loadAppointments();
                }
            });
        } else {
            $.ajax({
                url: apiUrl,
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify(appointmentData),
                success: function() {
                    showMessage("Appointment added", "success");
                    resetForm();
                    loadAppointments();
                }
            });
        }
    });

    $("#searchBtn").click(function() {
        searchAppointments();
    });

    $("#logoutBtn").click(function() {
        localStorage.removeItem("loggedInUser");
        window.location.href = "index.html";
    });

    $("#loggedInText").text("Logged in as " + loggedInUser.username);

    loadAppointments();
</script>

</body>
</html>
