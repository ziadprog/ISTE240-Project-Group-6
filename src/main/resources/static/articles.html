<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Articles</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: Arial,serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f0f0f0; }
        input, textarea { margin: 5px 0; padding: 5px; width: 300px; }
        button { margin: 5px; padding: 5px 10px; cursor: pointer; }
        .box { border: 1px solid #ccc; padding: 15px; margin: 10px 0; }
        nav { margin: 20px 0; padding: 10px; background: #f0f0f0; }
        nav a { margin: 0 10px; text-decoration: none; color: #333; }
    </style>
</head>
<body>

<nav>
    <a href="/index.html">Home</a> |
    <a href="/articles.html">Articles</a> |
    <a href="/resources.html">Resources</a> |
    <a href="/users.html">Users</a> |
    <a href="/assessments.html">Assessments</a>
</nav>

<header>Articles</header>

<input type="text" id="search" placeholder="Search by title..." onkeyup="doSearch()">

<div class="box">
    <input type="hidden" id="editId">
    <input type="text" id="title" placeholder="Title">
    <input type="text" id="author" placeholder="Author">
    <textarea id="content" placeholder="Content" rows="3"></textarea>
    <button id="saveBtn">Add Article</button>
</div>

<table id="list">
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Content</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody id="articlesTableBody"></tbody>
</table>

<br>
<a href="/index.html">Return to Home</a>

<script>
    const API = "http://localhost:8080/api/articles";

    function load() {
        $.ajax({
            url: API,
            method: "GET",
            success: function(data) {
                let html = "";
                for(let i = 0; i < data.length; i++) {
                    let a = data[i];
                    html += '<tr>';
                    html += '<td>' + (a.id || '') + '</td>';
                    html += '<td>' + (a.title || '') + '</td>';
                    html += '<td>' + (a.author || '') + '</td>';
                    html += '<td>' + (a.content || '') + '</td>';
                    html += '<td><button onclick="edit(' + a.id + ')">Edit</button> <button onclick="del(' + a.id + ')">Delete</button></td>';
                    html += '</tr>';
                }
                document.getElementById("articlesTableBody").innerHTML = html;
            },
            error: function(err) {
                console.error("Load error:", err);
                document.getElementById("articlesTableBody").innerHTML = '<tr><td colspan="5">Error loading</td></tr>';
            }
        });
    }

    function resetForm() {
        document.getElementById("editId").value = "";
        document.getElementById("title").value = "";
        document.getElementById("author").value = "";
        document.getElementById("content").value = "";
        document.getElementById("saveBtn").innerHTML = "Add Article";
    }

    document.getElementById("saveBtn").onclick = function() {
        let id = document.getElementById("editId").value;
        let item = {
            title: document.getElementById("title").value,
            author: document.getElementById("author").value,
            content: document.getElementById("content").value
        };

        if(id) {
            $.ajax({
                url: API + "/" + id,
                method: "PUT",
                contentType: "application/json",
                data: JSON.stringify(item),
                success: function() {
                    resetForm();
                    load();
                    alert("Updated!");
                },
                error: function() {
                    alert("Update failed!");
                }
            });
        } else {
            $.ajax({
                url: API,
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify(item),
                success: function() {
                    resetForm();
                    load();
                    alert("Added!");
                },
                error: function() {
                    alert("Add failed!");
                }
            });
        }
    };

    window.edit = function(id) {
        $.ajax({
            url: API + "/" + id,
            method: "GET",
            success: function(a) {
                document.getElementById("editId").value = a.id;
                document.getElementById("title").value = a.title;
                document.getElementById("author").value = a.author;
                document.getElementById("content").value = a.content;
                document.getElementById("saveBtn").innerHTML = "Update Article";
            }
        });
    };

    window.del = function(id) {
        if(confirm("Delete?")) {
            $.ajax({
                url: API + "/" + id,
                method: "DELETE",
                success: function() {
                    load();
                    alert("Deleted!");
                },
                error: function() {
                    alert("Delete failed!");
                }
            });
        }
    };

    window.doSearch = function() {
        let q = document.getElementById("search").value;
        if(q) {
            $.ajax({
                url: API + "/search?title=" + q,
                method: "GET",
                success: function(data) {
                    let html = "";
                    for(let i = 0; i < data.length; i++) {
                        let a = data[i];
                        html += '<tr>';
                        html += '<td>' + (a.id || '') + '</td>';
                        html += '<td>' + (a.title || '') + '</td>';
                        html += '<td>' + (a.author || '') + '</td>';
                        html += '<td>' + (a.content || '') + '</td>';
                        html += '<td><button onclick="edit(' + a.id + ')">Edit</button> <button onclick="del(' + a.id + ')">Delete</button></td>';
                        html += '</tr>';
                    }
                    document.getElementById("articlesTableBody").innerHTML = html;
                }
            });
        } else {
            load();
        }
    };

    load();
</script>
</body>
</html>
