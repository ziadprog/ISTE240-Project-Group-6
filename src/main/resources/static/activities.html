<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activities - ClearMind</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background: #f8f9fa;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold text-primary"
           href="index.html">
            ClearMind
        </a>

        <div class="d-flex align-items-center ms-auto">

<span id="loggedInText"
      class="me-3 text-muted">
</span>

            <a href="diary.html"
               class="btn btn-outline-primary btn-sm me-2">
                Diary
            </a>

            <a href="appointments.html"
               class="btn btn-outline-primary btn-sm me-2">
                Appointments
            </a>

            <a href="resources.html"
               class="btn btn-outline-primary btn-sm me-2">
                Resources
            </a>

            <a href="activities.html"
               class="btn btn-outline-primary btn-sm me-2">
                Activities
            </a>

            <a href="index.html"
               class="btn btn-outline-secondary btn-sm me-2">
                Home
            </a>

            <a href="profile.html" class="btn btn-outline-primary btn-sm me-2">Profile</a>

            <button id="logoutBtn"
                    class="btn btn-danger btn-sm">
                Logout
            </button>

        </div>

    </div>
</nav>

<div class="container py-5">

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h1 class="fw-bold">Activity Management</h1>
            <p class="text-muted mb-0">
                Add, edit, delete and search wellbeing activities.
            </p>
        </div>
    </div>

    <div id="messageBox"></div>

    <div class="card shadow-sm mb-4" id="activityFormCard">
        <div class="card-body">
            <h3 id="formTitle" class="mb-3">Add Activity</h3>

            <form id="activityForm">
                <input type="hidden" id="activityId">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Title</label>
                        <input type="text" id="title" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Category</label>
                        <select id="category" class="form-control" required>
                            <option value="">Select Category</option>
                            <option value="Exercise">Exercise</option>
                            <option value="Meditation">Meditation</option>
                            <option value="Reading">Reading</option>
                            <option value="Breathing">Breathing</option>
                            <option value="Social">Social</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Date</label>
                        <input type="date" id="date" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Duration</label>

                        <div class="input-group">
                            <input type="number" id="duration" class="form-control no-spinner" min="0" step="any" required>
                            <span class="input-group-text">hours</span>
                        </div>

                    </div>
                    <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea id="description" class="form-control" rows="3" required></textarea>
                    </div>
                </div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-primary" id="saveBtn">Save Activity</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3">
                <h3 class="mb-3 mb-md-0">My Activities</h3>

                <div class="d-flex gap-2">
                    <input type="text" id="searchTitle" class="form-control" placeholder="Search by title">
                    <button class="btn btn-outline-primary" id="searchBtn">Search</button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Description</th>
                        <th>Date</th>
                        <th>Duration</th>
                        <th>Actions</th>
                    </tr>
                    </thead>

                    <tbody id="activityTableBody"></tbody>
                </table>
            </div>

        </div>
    </div>

</div>

<script>
    const apiUrl = "/api/activities";
    const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));

    if (!loggedInUser) {
        window.location.href = "login.html";
    }

    function showMessage(message, type) {
        $("#messageBox").html(
            "<div class='alert alert-" + type + "'>" + message + "</div>"
        );
    }

    function resetForm() {
        $("#activityForm")[0].reset();
        $("#activityId").val("");
        $("#formTitle").text("Add Activity");
        $("#saveBtn").text("Save Activity");
    }

    function loadActivities() {
        $.get(apiUrl + "/user/" + loggedInUser.id, function(activities) {
            let html = "";

            $.each(activities, function(i, activity) {
                html +=
                    "<tr>" +
                    "<td>" + activity.id + "</td>" +
                    "<td>" + activity.title + "</td>" +
                    "<td>" + activity.category + "</td>" +
                    "<td>" + activity.description + "</td>" +
                    "<td>" + activity.date + "</td>" +
                    "<td>" + activity.duration + " hours</td>" +
                    "<td>" +
                    "<button class='btn btn-warning btn-sm me-2' onclick='editActivity(" + activity.id + ")'>Edit</button>" +
                    "<button class='btn btn-danger btn-sm' onclick='deleteActivity(" + activity.id + ")'>Delete</button>" +
                    "</td>" +
                    "</tr>";
            });

            $("#activityTableBody").html(html);
        });
    }

    function searchActivities() {
        let title = $("#searchTitle").val();

        if (title == "") {
            loadActivities();
            return;
        }

        $.get(apiUrl + "/user/" + loggedInUser.id + "/search?title=" + title, function(activities) {
            let html = "";

            $.each(activities, function(i, activity) {
                html +=
                    "<tr>" +
                    "<td>" + activity.id + "</td>" +
                    "<td>" + activity.title + "</td>" +
                    "<td>" + activity.category + "</td>" +
                    "<td>" + activity.description + "</td>" +
                    "<td>" + activity.date + "</td>" +
                    "<td>" + activity.duration + " hours</td>" +
                    "<td>" +
                    "<button class='btn btn-warning btn-sm me-2' onclick='editActivity(" + activity.id + ")'>Edit</button>" +
                    "<button class='btn btn-danger btn-sm' onclick='deleteActivity(" + activity.id + ")'>Delete</button>" +
                    "</td>" +
                    "</tr>";
            });

            $("#activityTableBody").html(html);
        });
    }

    function editActivity(id) {
        $.get(apiUrl + "/" + id, function(activity) {

            $("#activityId").val(activity.id);
            $("#title").val(activity.title);
            $("#category").val(activity.category);
            $("#description").val(activity.description);
            $("#date").val(activity.date);
            $("#duration").val(activity.duration);

            $("#formTitle").text("Edit Activity");
            $("#saveBtn").text("Update Activity");
        });
    }

    function deleteActivity(id) {
        if (!confirm("Delete this activity?")) {
            return;
        }

        $.ajax({
            url: apiUrl + "/" + id,
            type: "DELETE",

            success: function() {
                showMessage("Activity deleted", "success");
                loadActivities();
            }
        });
    }

    $("#activityForm").submit(function(e) {
        e.preventDefault();

        let id = $("#activityId").val();

        let activityData = {
            title: $("#title").val(),
            category: $("#category").val(),
            description: $("#description").val(),
            date: $("#date").val(),
            duration: $("#duration").val(),
            user: {
                id: loggedInUser.id
            }
        };

        if (id) {
            $.ajax({
                url: apiUrl + "/" + id,
                type: "PUT",
                contentType: "application/json",
                data: JSON.stringify(activityData),

                success: function() {
                    showMessage("Activity updated", "success");
                    resetForm();
                    loadActivities();
                }
            });
        } else {
            $.ajax({
                url: apiUrl,
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify(activityData),

                success: function() {
                    showMessage("Activity added", "success");
                    resetForm();
                    loadActivities();
                }
            });
        }
    });

    $("#searchBtn").click(function() {
        searchActivities();
    });

    $("#logoutBtn").click(function() {
        localStorage.removeItem("loggedInUser");
        window.location.href = "index.html";
    });

    $("#loggedInText").text("Logged in as " + loggedInUser.username);

    loadActivities();
</script>

</body>
</html>
