<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ClearMind</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background: #f8f9fa;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="index.html">ClearMind</a>

        <div class="d-flex align-items-center ms-auto">
            <span id="loggedInText" class="me-3 text-muted"></span>
            <a href="diary.html" class="btn btn-outline-primary btn-sm me-2">Diary</a>
            <a href="appointments.html" class="btn btn-outline-primary btn-sm me-2">Appointments</a>
            <a href="resources.html" class="btn btn-outline-primary btn-sm me-2">Resources</a>
            <a href="activities.html" class="btn btn-outline-primary btn-sm me-2">Activities</a>
            <a href="index.html" class="btn btn-outline-secondary btn-sm me-2">Home</a>
            <a href="profile.html" class="btn btn-primary btn-sm me-2">Profile</a>
            <button id="logoutBtn" class="btn btn-danger btn-sm">Logout</button>
        </div>
    </div>
</nav>

<div class="container py-5">

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h1 class="fw-bold">User Profile</h1>
            <p class="text-muted mb-0">
                View, update, or delete your account.
            </p>
        </div>
    </div>

    <div id="messageBox"></div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="mb-3">Edit Account</h3>

            <form id="profileForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary">Update Profile</button>
                <button type="button" id="deleteAccountBtn" class="btn btn-danger">Delete Account</button>
            </form>
        </div>
    </div>

</div>

<script>
    const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
    const apiUrl = "/api/users";

    if (!loggedInUser || !loggedInUser.id) {
        window.location.href = "login.html";
    }

    function showMessage(message, type) {
        $("#messageBox").html("<div class='alert alert-" + type + "'>" + message + "</div>");
    }

    function loadUser() {
        $.get(apiUrl + "/" + loggedInUser.id, function(user) {
            $("#username").val(user.username);
            $("#email").val(user.email);
            $("#password").val(user.password);
            $("#loggedInText").text("Logged in as " + user.username);
        });
    }

    $("#profileForm").submit(function(e) {
        e.preventDefault();

        let updatedUser = {
            username: $("#username").val(),
            email: $("#email").val(),
            password: $("#password").val()
        };

        $.ajax({
            url: apiUrl + "/" + loggedInUser.id,
            type: "PUT",
            contentType: "application/json",
            data: JSON.stringify(updatedUser),

            success: function() {
                loggedInUser.username = $("#username").val();
                loggedInUser.email = $("#email").val();

                localStorage.setItem("loggedInUser", JSON.stringify(loggedInUser));

                $("#loggedInText").text("Logged in as " + loggedInUser.username);

                showMessage("Profile updated", "success");
            },

            error: function() {
                showMessage("Could not update profile", "danger");
            }
        });
    });

    $("#deleteAccountBtn").click(function() {
        if (!confirm("Are you sure you want to delete your account? This will delete your related data too.")) {
            return;
        }

        $.ajax({
            url: apiUrl + "/" + loggedInUser.id,
            type: "DELETE",

            success: function() {
                localStorage.removeItem("loggedInUser");
                window.location.href = "register.html";
            },

            error: function() {
                showMessage("Could not delete account", "danger");
            }
        });
    });

    $("#logoutBtn").click(function() {
        localStorage.removeItem("loggedInUser");
        window.location.href = "index.html";
    });

    loadUser();
</script>

</body>
</html>
