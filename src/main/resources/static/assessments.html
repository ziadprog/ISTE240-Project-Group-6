<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Self Assessments</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: Arial,serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f0f0f0; }
        input { margin: 5px 0; padding: 5px; width: 300px; }
        button { margin: 5px; padding: 5px 10px; cursor: pointer; }
        .box { border: 1px solid #ccc; padding: 15px; margin: 10px 0; }
        nav { margin: 20px 0; padding: 10px; background: #f0f0f0; }
        nav a { margin: 0 10px; text-decoration: none; color: #333; }
    </style>
</head>
<body>

<nav>
    <a href="/index.html">Home</a> |
    <a href="/articles.html">Articles</a> |
    <a href="/resources.html">Resources</a> |
    <a href="/users.html">Users</a> |
    <a href="/assessments.html">Assessments</a>
</nav>

<header>Self Assessments</header>

<input type="text" id="search" placeholder="Search by username..." onkeyup="doSearch()">

<div class="box">
    <input type="hidden" id="editId">
    <input type="text" id="username" placeholder="Username">
    <input type="number" id="stress" placeholder="Stress Points (1-10)">
    <input type="number" id="anxiety" placeholder="Anxiety Points (1-10)">
    <input type="text" id="result" placeholder="Result">
    <button id="saveBtn">Add Assessment</button>
</div>

<table id="list">
    <thead>
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Stress</th>
        <th>Anxiety</th>
        <th>Result</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<br>
<a href="/index.html">Return to Home</a>

<script>
    const API = "http://localhost:8080/api/assessments";

    function load() {
        $.get(API, function(data) {
            let html = "";
            for(let a of data) {
                html += '<tr>';
                html += '<td>' + a.id + '</td>';
                html += '<td>' + a.username + '</td>';
                html += '<td>' + (a.stresspoints || 0) + '</td>';
                html += '<td>' + (a.anxietypoints || 0) + '</td>';
                html += '<td>' + (a.result || '') + '</td>';
                html += '<td><button onclick="edit(' + a.id + ')">Edit</button> <button onclick="del(' + a.id + ')">Delete</button></td>';
                html += '</tr>';
            }
            $("#list tbody").html(html);
        });
    }

    $("#saveBtn").click(function() {
        let id = $("#editId").val();
        let item = {
            username: $("#username").val(),
            stresspoints: parseInt($("#stress").val()) || 0,
            anxietypoints: parseInt($("#anxiety").val()) || 0,
            result: $("#result").val()
        };

        if(id) {
            $.ajax({
                url: `${API}/${id}`,
                method: "PUT",
                contentType: "application/json",
                data: JSON.stringify(item),
                success: function() {
                    $("#editId, #username, #stress, #anxiety, #result").val("");
                    $("#saveBtn").text("Add Assessment");
                    load();
                    alert("Assessment updated!");
                }
            });
        } else {
            $.ajax({
                url: API,
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify(item),
                success: function() {
                    $("#username, #stress, #anxiety, #result").val("");
                    load();
                    alert("Assessment added!");
                }
            });
        }
    });

    window.edit = function(id) {
        $.get(`${API}/${id}`, function(a) {
            $("#editId").val(a.id);
            $("#username").val(a.username);
            $("#stress").val(a.stresspoints);
            $("#anxiety").val(a.anxietypoints);
            $("#result").val(a.result);
            $("#saveBtn").text("Update Assessment");
        });
    };

    window.del = function(id) {
        if(confirm("Delete this assessment?")) {
            $.ajax({
                url: `${API}/${id}`,
                method: "DELETE",
                success: function() {
                    load();
                    alert("Assessment deleted!");
                }
            });
        }
    };

    window.doSearch = function() {
        let q = $("#search").val();
        if(q) {
            $.get(`${API}/search?username=${q}`, function(data) {
                let html = "";
                for(let a of data) {
                    html += '<tr>';
                    html += '<td>' + a.id + '</td>';
                    html += '<td>' + a.username + '</td>';
                    html += '<td>' + (a.stresspoints || 0) + '</td>';
                    html += '<td>' + (a.anxietypoints || 0) + '</td>';
                    html += '<td>' + (a.result || '') + '</td>';
                    html += '<td><button onclick="edit(' + a.id + ')">Edit</button> <button onclick="del(' + a.id + ')">Delete</button></td>';
                    html += '</tr>';
                }
                $("#list tbody").html(html);
            });
        } else {
            load();
        }
    };

    load();
</script>
</body>
</html>
